# /nginx/conf.d/react.conf
# Дополнительные настройки для React приложения
#
# ОПТИМИЗАЦИЯ СТАТИЧЕСКИХ ФАЙЛОВ
#
# Долгосрочное кэширование для статики с хэшем в имени
# React обычно создает файлы вида main.abc123.js, styles.def456.css
# В это регулярное выражение попадают все файлы статики реакта
location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    # Какое время браузер будет считать актуальным файлы статики
    #  пусть будет 10 часов
    expires 10h;
    # Браузер будет хранить кэш
    #   не будет делать запрос на проверку актуальности
    add_header Cache-Control "public, immutable";
    # Отключение логирования запросов проверки кэша
    access_log off;
    # В случае если файл не будет найден, вернуть ошибку
    try_files $uri =404;
}
#
# ЗАЩИТА ИСХОДНОГО КОДА
#
# Запрет доступа к source maps в production
# Блокирует отдачу всех файлов с расширением .map
location ~* \.map$ {
    deny all;
    access_log off;
    log_not_found off;
}
#
# Запрет доступа к service worker (если нужно)
# location /service-worker.js {
#     add_header Cache-Control "no-cache";
#     add_header Service-Worker-Allowed "/";
# }
#
# ОПТИМИЗАЦИЯ HTML
#
# Обрабатывает все html и htm файлы
location ~* \.(html|htm)$ {
    # Данная настройка важна для мобильных устройств - мобильные устройства имеют 
    # более агрессивную политику работы с кэшем
    # must-revalidate - обязательная проверка с сервера перед использованием кэша
    add_header Cache-Control "no-cache, must-revalidate";
}
