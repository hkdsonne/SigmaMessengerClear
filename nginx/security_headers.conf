# /etc/nginx/security_headers.conf
# Заголовки безопасности для защиты от распространенных атак
#
# Защита от кликджекинга (Clickjacking)
add_header X-Frame-Options "SAMEORIGIN" always;
#
# Защита от MIME-сниффинга (MIME-sniffing)
add_header X-Content-Type-Options "nosniff" always;
#
# Защита от XSS (Cross-Site Scripting)
add_header X-XSS-Protection "1; mode=block" always;
#
# Referrer Policy - контроль передачи referer
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
#
# Content Security Policy (CSP) - базовая настройка
# Более строгую настройку нужно адаптировать под конкретное приложение
# Под реакт из script-src убрал:
#  * unsafe-inline - разрешает инлайн скрипты - xss 
#  * unsafe-eval - разрешает eval() - превращение текстовой строки в исполняемый код
#
add_header Content-Security-Policy "
    default-src 'self'; 
    script-src 'self'; 
    style-src 'self' 'unsafe-inline'; 
    img-src 'self' data: https:; 
    font-src 'self'; 
    # Контроль куда могут направляться запросы из JS. Self - разрешит только запросы к 
    #  реакту. Запретит любые запросы к апи бэкенда. То что нужно, внутренние апи 
    #  закрыты.
    connect-src 'self'; 
    frame-ancestors 'self'; 
    # Запрет загрузки http контента на https-станция
    block-all-mixed-content;
    # Автоматически заменит все http на https
    upgrade-insecure-requests;
    form-action 'self';
    # Запрет загрузки плагинов (могут быть уязвимы)
    frame-src 'self';
    base-uri 'self';
" always;
#
# Permissions Policy - ограничение доступа к функциям браузера
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
#
# Strict-Transport-Security (HSTS) - только для HTTPS
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
#
# Удаление заголовка Server для сокрытия версии
# В Nginx это делается через модуль headers-more или компиляцию
# Для стандартного Nginx можно использовать:
proxy_hide_header Server;
# Или переопределить
server_tokens off;
